name: Update xiaosa, Sync and Deploy to Vercel

on:
  workflow_dispatch:
  schedule:
    - cron: "20 5 * * *"
  push:
    branches:
      - master
    paths:
      - "tools/**"

jobs:
  # 🔄 阶段一：安全同步上游（保持原样）
  sync-upstream:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Local Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Git Config
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
      - name: Merge Upstream
        run: |
          git remote add upstream https://github.com/qist/tvbox.git
          git fetch upstream
          git merge upstream/master -m "自动合并上游更新" --allow-unrelated-histories || true
      - name: Push Combined Code
        run: |
          git push origin master

  # 🐍 阶段二：xiaosa 工具链（保持原样）
  xiaosa:
    needs: sync-upstream
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout the branch
        uses: actions/checkout@v4
      - name: xiaosa tools
        run: |
          cd tools/
          pip install demjson3 pycryptodome requests --break-system-packages
          python tvbox.py https://9877.kstore.space/ONE/one.json xs.json dec
          python build_local.py xs.json output
          \cp -pdr output/* ../xiaosa/
          python xiao.py ../xiaosa/api.json dianshi.json
          python xiao.py ../xiaosa/api.json jsm.json
          python copy_xbpq.py dianshi_with_app_sites.json
          \cp -pdr dianshi_with_app_sites.json ../dianshi.json
          \cp -pdr jsm_with_app_sites.json ../jsm.json
          \cp -pdr ../xiaosa/spider.jar ../jar/spider.jar
          rm -rf dianshi_with_app_sites.json jsm_with_app_sites.json output xs.json
          cd ../
        shell: bash
      - name: Upload xiaosa artifacts
        uses: actions/upload-artifact@v4
        with:
          name: xiaosa-output
          path: |
            dianshi.json
            jsm.json
            jar/spider.jar
            xiaosa/

  # 🦅 阶段三：fty 工具链（保持原样）
  fty:
    needs: sync-upstream
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout the branch
        uses: actions/checkout@v4
      - name: fty tools
        run: |
          cd tools/
          pip install demjson3 pycryptodome requests --break-system-packages
          python tvbox.py https://www.xn--sss604efuw.net/tv ty.json dec
          python fty.py ty.json
          \cp -pdr tvbox_cleaned.json ../fty.json
          \cp -pdr fan.txt ../jar/fan.txt
          git clone --depth=1 --recursive https://github.com/fantaiying7/EXT.git
          \cp -pdr EXT/* ../FTY/
          rm -rf tvbox_cleaned.json fan.txt EXT ty.json
          cd ../
        shell: bash
      - name: Upload fty artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fty-output
          path: |
            fty.json
            jar/fan.txt
            FTY/

  # 🚀 阶段四：保存资产回 GitHub（保持原样）
  git-push:
    needs: [xiaosa, fty]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Checkout the branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Download xiaosa artifacts
        uses: actions/download-artifact@v4
        with:
          name: xiaosa-output
        continue-on-error: true
      - name: Download fty artifacts
        uses: actions/download-artifact@v4
        with:
          name: fty-output
        continue-on-error: true
      - name: Git push assets to master branch
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if ! git diff-index --quiet HEAD --; then
            git commit -m "自动拉取上游并更新自定义源 $(date +%Y%m%d%H%M)"
            git push origin master
          else
            echo "没有文件更新，不执行 git push"
          fi

  # ⚡ 阶段五：【全新加入】秒级自动部署到 Vercel
  deploy-vercel:
    needs: git-push # 👈 确保代码和最新 json 推回 master 后再部署
    runs-on: ubuntu-latest
    steps:
      - name: Checkout master branch
        uses: actions/checkout@v4
        with:
          ref: master # 强行拉取刚刚被 git-push 更新过的最新主分支

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod' # 👈 确保直接发布到生产环境（直接更新线上链接）
